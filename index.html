<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MINECRAFT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="home-screen" class="screen active">
    <div class="login-box">
      <h1>MINECRAFT</h1>
      <p>Enter secret password to play</p>
      <input id="password-input" type="password" placeholder="Secret Password">
      <button id="login-btn">Enter World</button>
      <p id="login-error"></p>
    </div>
  </div>

  <div id="game-screen" class="screen">
  <canvas id="game-canvas"></canvas>
  
  <!-- NEW HOTBAR -->
  <div class="hotbar-container" id="hotbar-ui">
    <!-- 9 slots will be generated by JS -->
  </div>

  <div id="loading-screen" class="loading hidden">
    <div class="loading-box">
      <p id="loading-message">Loading world...</p>
    </div>
  </div>
</div>


  <script type="module">
    import(`./main.js?cache=${Date.now()}`);
  </script>
</body>

</html>
