<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft </title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }

        /* Login Screen Styles */
        #home-screen {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #0e2683, #2f70f2, #93c7f8);
            z-index: 100;
        }
        .login-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px; border-radius: 20px;
            text-align: center; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 350px;
        }
        h1 { margin-bottom: 20px; letter-spacing: 2px; }
        input {
            width: 100%; padding: 12px; margin: 15px 0;
            border-radius: 8px; border: none; font-size: 16px;
        }
        button {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: #4caf50; color: white; font-weight: bold;
            cursor: pointer; transition: background 0.3s; font-size: 16px;
        }
        button:hover { background: #45a049; }

        /* Game Screen Styles */
        #game-screen {
            display: none; width: 100vw; height: 100vh; position: relative;
        }
        #game-canvas { width: 100%; height: 100%; display: block; }

        /* Single Centered Crosshair */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 28px;
            font-weight: 300;
            pointer-events: none; /* Allows clicking through the crosshair */
            user-select: none;
        }

        /* Hotbar / Belt UI */
        #hotbar-ui {
            position: absolute;
            bottom: 25px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px; border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .hotbar-slot {
            width: 54px; height: 54px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #444;
            display: flex; align-items: center; justify-content: center;
            position: relative; border-radius: 6px;
        }
        .hotbar-slot.active {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .slot-emoji { font-size: 24px; }
        .slot-count {
            position: absolute; bottom: 2px; right: 4px;
            color: white; font-size: 12px; font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="home-screen">
        <div class="login-box">
            <h1>MINECRAFT</h1>
            <p>Enter password to play</p>
            <input type="password" id="password-input" placeholder="Password">
            <button id="login-btn">Enter World</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen">
        <!-- The only crosshair -->
        <div id="crosshair">+</div>

        <!-- The Hotbar (Belt) -->
        <div id="hotbar-ui">
            <!-- Slots are generated by player.js updateUI() -->
        </div>

        <canvas id="game-canvas"></canvas>
    </div>

    <!-- Load the game modules -->
    <script type="module" src="main.js"></script>

</body>
</html>
